services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tienda_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_password

  web_django:  # El Monolito (v1)
    build: .
    command: sh -c "python manage.py migrate && gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DB_NAME=tienda_db
      - DB_USER=postgres
      - DB_PASSWORD=secret_password
      - DB_HOST=db
      - DB_PORT=5432
    # NOTA: Ya no hay seccion 'ports' aqui. Django esta aislado.

  pagos_flask:  # El Microservicio (v2) - EL ESTRANGULADOR
    build: ./microservicio_pagos
    ports:
      - "5000:5000"  # Solo para pruebas iniciales

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"  # Nginx es el unico que da la cara a internet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_django
      - pagos_flask

volumes:
  postgres_data:
