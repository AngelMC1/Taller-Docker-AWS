# nginx/nginx.conf

upstream django_v1 {
    server web_django:8000;
}

upstream flask_v2 {
    server pagos_flask:5000;
}

server {
    listen 80;

    location = /favicon.ico { access_log off; log_not_found off; }

    # RUTA VIEJA: Sigue yendo a Django
    location /api/v1/ {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # RUTA NUEVA: Estrangulamos la funcion de compra y la mandamos a Flask
    location /api/v2/comprar {
        proxy_pass http://flask_v2;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Todo lo demas sigue yendo a Django
    location / {
        proxy_pass http://django_v1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
